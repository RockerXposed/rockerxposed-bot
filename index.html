<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, relative-scale=1.0">
    <title>Rocker Xposed - VIP Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        .glass-panel {
            background: rgba(30, 41, 59, 0.75);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <div class="w-full max-w-md glass-panel rounded-3xl p-8 text-white relative overflow-hidden">
        <div class="absolute -top-24 -left-24 w-48 h-48 bg-purple-600 rounded-full blur-3xl opacity-30"></div>
        <div class="absolute -bottom-24 -right-24 w-48 h-48 bg-blue-600 rounded-full blur-3xl opacity-30"></div>

        <div class="text-center mb-8 relative z-10">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-tr from-purple-600 to-blue-500 mb-4 shadow-lg shadow-purple-500/30">
                <i class="fa-solid fa-bolt text-2xl text-white animate-pulse"></i>
            </div>
            <h1 class="text-2xl font-black tracking-wider bg-gradient-to-r from-white via-slate-200 to-purple-400 bg-clip-text text-transparent">
                ROCKER XPOSED
            </h1>
            <p class="text-xs text-slate-400 mt-1 uppercase tracking-widest font-semibold">VIP Proxy Core</p>
        </div>

        <div id="auth-container" class="space-y-5 relative z-10">
            <div>
                <label class="block text-xs font-bold text-slate-300 uppercase tracking-wider mb-2">Technician ID</label>
                <div class="relative">
                    <i class="fa-solid fa-user-gear absolute left-4 top-3.5 text-slate-400 text-sm"></i>
                    <input type="text" id="tech_id" placeholder="Enter Technician ID" 
                           class="w-full bg-slate-900/60 border border-slate-700/50 rounded-xl py-3 pl-11 pr-4 text-white placeholder-slate-500 focus:outline-none focus:border-purple-500 focus:ring-1 focus:ring-purple-500 transition-all text-sm">
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-300 uppercase tracking-wider mb-2">Security Password</label>
                <div class="relative">
                    <i class="fa-solid fa-lock absolute left-4 top-3.5 text-slate-400 text-sm"></i>
                    <input type="password" id="password" placeholder="••••••••" 
                           class="w-full bg-slate-900/60 border border-slate-700/50 rounded-xl py-3 pl-11 pr-4 text-white placeholder-slate-500 focus:outline-none focus:border-purple-500 focus:ring-1 focus:ring-purple-500 transition-all text-sm">
                </div>
            </div>

            <button onclick="triggerSecureAuth()" id="login-btn"
                    class="w-full bg-gradient-to-r from-purple-600 to-blue-600 hover:from-purple-500 hover:to-blue-500 active:scale-[0.98] text-white font-bold py-3.5 px-4 rounded-xl shadow-lg shadow-purple-600/20 transition-all flex items-center justify-center gap-2 text-sm mt-2">
                <i class="fa-solid fa-shield-halved"></i>
                <span>Secure Login</span>
            </button>

            <div id="status-box" class="hidden text-center p-3 rounded-xl text-xs font-semibold tracking-wide border transition-all"></div>
        </div>

        <div id="dashboard-container" class="hidden space-y-6 relative z-10">
            <div class="flex items-center justify-between border-b border-slate-700/50 pb-4">
                <div>
                    <p class="text-xs text-slate-400">Active Proxy Session</p>
                    <h3 id="display-tech-id" class="text-base font-bold text-purple-400">Tech ID</h3>
                </div>
                <button onclick="logout()" class="text-xs bg-slate-800 hover:bg-slate-700 px-3 py-1.5 rounded-lg border border-slate-700 text-slate-300">
                    Logout
                </button>
            </div>

            <div>
                <h4 class="text-sm font-bold text-slate-200 mb-3 flex items-center gap-2">
                    <i class="fa-solid fa-list-check text-blue-400"></i> Active Assignments
                </h4>
                <div id="orders-list" class="space-y-3 max-h-64 overflow-y-auto pr-1">
                    </div>
            </div>
        </div>

        <div class="text-center mt-8 pt-4 border-t border-slate-800/60 relative z-10">
            <p class="text-[10px] text-slate-500 tracking-wider">POWERED BY ROCKER XPOSED ENGINE v2.6</p>
        </div>
    </div>

    <script>
        const BACKEND_URL = "https://rockerxposed-bot.onrender.com";

        function showStatus(text, type) {
            const box = document.getElementById("status-box");
            box.classList.remove("hidden", "bg-red-500/10", "border-red-500/30", "text-red-400", "bg-yellow-500/10", "border-yellow-500/30", "text-yellow-400", "bg-green-500/10", "border-green-500/30", "text-green-400");
            
            if (type === "error") { box.classList.add("bg-red-500/10", "border-red-500/30", "text-red-400"); } 
            else if (type === "load") { box.classList.add("bg-yellow-500/10", "border-yellow-500/30", "text-yellow-400"); } 
            else { box.classList.add("bg-green-500/10", "border-green-500/30", "text-green-400"); }
            box.innerHTML = text;
            box.classList.remove("hidden");
        }

        async function triggerSecureAuth() {
            const inputTechId = document.getElementById("tech_id").value.trim();
            const inputPassword = document.getElementById("password").value.trim();

            if (!inputTechId || !inputPassword) {
                showStatus("⚠️ Please fill in all fields!", "error");
                return;
            }

            showStatus("<i class='fa-solid fa-spinner animate-spin mr-2'></i>Routing session through Render Core...", "load");

            try {
                const response = await fetch(`${BACKEND_URL}/api/web_login`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ tech_id: inputTechId, password: inputPassword })
                });

                const result = await response.json();

                if (result.success === true) {
                    showStatus("✅ Verification successful! Loading sync pipeline...", "success");
                    localStorage.setItem("active_tech_id", inputTechId);
                    
                    setTimeout(() => { loadDashboard(inputTechId); }, 800);
                } else {
                    showStatus(`❌ ${result.message || 'Portal Rejected Credentials!'}`, "error");
                }
            } catch (err) {
                showStatus("❌ Render server is waking up. Wait 30 seconds and retry!", "error");
            }
        }

        async function loadDashboard(techId) {
            document.getElementById("auth-container").classList.add("hidden");
            document.getElementById("dashboard-container").classList.remove("hidden");
            document.getElementById("display-tech-id").innerText = `Tech ID: ${techId}`;

            const listContainer = document.getElementById("orders-list");
            listContainer.innerHTML = "<p class='text-xs text-slate-400 text-center py-4 animate-pulse'>Syncing data stream...</p>";

            try {
                const res = await fetch(`${BACKEND_URL}/api/web_orders?tech_id=${techId}`);
                const data = await res.json();
                const orders = data.orders || [];

                listContainer.innerHTML = "";

                if (orders.length === 0) {
                    listContainer.innerHTML = "<p class='text-xs text-slate-500 text-center py-6 border border-dashed border-slate-700/60 rounded-xl'>No pending assignments remaining.</p>";
                    return;
                }

                orders.forEach(order => {
                    const div = document.createElement("div");
                    div.className = "bg-slate-900/40 border border-slate-800 p-3 rounded-xl flex items-center justify-between gap-2 text-xs hover:border-slate-700 transition-all";
                    div.innerHTML = `
                        <div>
                            <p class="font-bold text-slate-200">#${order.id || 'Order'}</p>
                            <p class="text-[10px] text-purple-400 font-semibold">${order.status || 'In Progress'}</p>
                        </div>
                        <button onclick="markReached('${order.id}', this)" class="bg-gradient-to-r from-purple-600 to-blue-600 px-4 py-1.5 rounded-lg text-white font-bold transition-all">
                            Reach
                        </button>
                    `;
                    listContainer.appendChild(div);
                });
            } catch (e) {
                listContainer.innerHTML = "<p class='text-xs text-red-400 text-center py-4'>Error pulling active orders.</p>";
            }
        }

        async function markReached(woId, button) {
            const currentTechId = localStorage.getItem("active_tech_id");
            const originalText = button.innerText;
            button.disabled = true;
            button.innerHTML = "<i class='fa-solid fa-spinner animate-spin'></i>";

            try {
                const res = await fetch(`${BACKEND_URL}/api/web_reach`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ tech_id: currentTechId, wo_id: woId })
                });
                const result = await res.json();

                if (result.success) {
                    button.parentElement.className += " opacity-40 border-green-900/50";
                    button.className = "bg-green-900/40 text-green-400 border border-green-500/30 px-3 py-1.5 rounded-lg pointer-events-none text-xs font-bold";
                    button.innerText = "Reached";
                } else {
                    button.disabled = false; button.innerText = originalText;
                    alert("Action failed to submit.");
                }
            } catch (err) {
                button.disabled = false; button.innerText = originalText;
                alert("Connection lost.");
            }
        }

        function logout() {
            localStorage.removeItem("active_tech_id");
            document.getElementById("dashboard-container").classList.add("hidden");
            document.getElementById("auth-container").classList.remove("hidden");
            document.getElementById("status-box").classList.add("hidden");
            document.getElementById("tech_id").value = "";
            document.getElementById("password").value = "";
        }

        window.onload = function() {
            const savedId = localStorage.getItem("active_tech_id");
            if (savedId) { loadDashboard(savedId); }
        }
    </script>
</body>
</html>
